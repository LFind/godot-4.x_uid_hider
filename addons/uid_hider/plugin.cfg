[plugin]

name="UID Hider"
description="Automatically hides generated .uid files from your system file manager to keep project directories clean and clutter-free. Detects the OS and uses appropriate hiding methods: creates a .hidden file on Linux (tested with Dolphin) and applies the hidden attribute (attrib +h) on Windows. Uses a background thread to prevent editor UI freezing."
author="L_Find"
version="1.0.0"
script="uid_hider.gd"
