[plugin]

name="UID Hider"
description="Automatically hides generated .uid files from your system file manager to keep project directories clean and clutter-free. Detects the OS and uses appropriate hiding methods: creates a .hidden file on Linux (tested with Dolphin) and applies the hidden attribute on Windows."
